<!-- ponytail: static duplicate of the /contact form, exists only so Netlify's build-time form detector can find it — never linked or rendered to users. See https://ntl.fyi/next-runtime-forms-migration -->
<form name="contact" data-netlify="true" hidden>
  <input type="text" name="name" />
  <input type="tel" name="phone" />
  <input type="text" name="address" />
  <textarea name="message"></textarea>
</form>
